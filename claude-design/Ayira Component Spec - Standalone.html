  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gba(13,79,71,0.04);\n  --shadow-sm:0 1px 3px rgba(13,79,71,0.06),0 1px 2px rgba(13,79,71,0.04);\n  --shadow-md:0 6px 16px -4px rgba(13,79,71,0.08),0 2px 4px rgba(13,79,71,0.04);\n  --shadow-lg:0 16px 32px -12px rgba(13,79,71,0.14),0 4px 8px rgba(13,79,71,0.04);\n  --shadow-xl:0 28px 56px -16px rgba(13,79,71,0.18),0 8px 16px rgba(13,79,71,0.05);\n  --ease-out:cubic-bezier(0.22,1,0.36,1);\n  --dur-fast:120ms; --dur-med:220ms; --dur-slow:360ms;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nbody{font-family:var(--font-sans);background:var(--color-cream-100);color:var(--color-ink-700);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\na{text-decoration:none;color:inherit;}\n\n/* ── LAYOUT ── */\n.layout{display:grid;grid-template-columns:256px 1fr;min-height:100vh;}\n\n/* ── SIDEBAR ── */\n.sidebar{\n  position:sticky;top:0;height:100vh;overflow-y:auto;\n  background:var(--color-forest-700);\n  scrollbar-width:thin;scrollbar-color:var(--color-forest-600) transparent;\n}\n.sidebar::-webkit-scrollbar{width:4px;}\n.sidebar::-webkit-scrollbar-thumb{background:var(--color-forest-600);border-radius:4px;}\n.sb-top{padding:28px 24px 20px;border-bottom:1px solid var(--color-forest-600);}\n.sb-brand{font-size:16px;font-weight:800;color:var(--color-cream-50);letter-spacing:-0.02em;}\n.sb-subtitle{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-mustard-300);margin-top:6px;}\n.sb-group{padding:20px 16px 6px;}\n.sb-group-title{font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-forest-500);padding:0 8px;margin-bottom:6px;}\n.sb-nav{list-style:none;display:flex;flex-direction:column;gap:1px;}\n.sb-nav a{\n  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;\n  font-size:12.5px;font-weight:500;color:var(--color-forest-100);transition:all 120ms;\n}\n.sb-nav a:hover{background:var(--color-forest-600);color:var(--color-cream-50);}\n.sb-num{font-size:9px;font-weight:700;color:var(--color-forest-500);width:18px;flex-shrink:0;font-variant-numeric:tabular-nums;}\n\n/* ── MAIN ── */\n.main{min-height:100vh;}\n\n/* ── DOC HEADER ── */\n.doc-header{\n  background:var(--color-forest-700);color:var(--color-cream-50);\n  padding:72px 64px 60px;\n}\n.doc-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-mustard-300);margin-bottom:14px;}\n.doc-header h1{font-size:56px;font-weight:800;letter-spacing:-0.025em;line-height:1.04;margin-bottom:16px;}\n.doc-header > p{font-size:16px;color:var(--color-forest-100);max-width:580px;line-height:1.65;}\n.doc-meta{display:flex;flex-wrap:wrap;gap:32px;margin-top:36px;padding-top:32px;border-top:1px solid var(--color-forest-600);}\n.doc-meta-item .dm-label{font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-forest-500);margin-bottom:4px;}\n.doc-meta-item .dm-val{font-size:14px;font-weight:600;color:var(--color-cream-50);}\n\n/* ── TOKEN QUICK-REF ── */\n.token-section{padding:56px 64px;background:var(--color-cream-50);border-bottom:1px solid var(--color-ink-200);}\n.token-section h2{font-size:22px;font-weight:700;color:var(--color-forest-700);letter-spacing:-0.01em;margin-bottom:8px;}\n.token-section > p{font-size:14px;color:var(--color-ink-500);margin-bottom:32px;line-height:1.55;}\n.token-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}\n.token-group-title{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-forest-600);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--color-forest-50);}\n.token-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--color-ink-100);}\n.token-row:last-child{border-bottom:none;}\n.token-swatch{width:22px;height:22px;border-radius:5px;flex-shrink:0;border:1px solid rgba(0,0,0,0.09);}\n.token-name{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:10.5px;color:var(--color-forest-700);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.token-hex{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:10px;color:var(--color-ink-400);}\n\n/* ── COMPONENT SECTION ── */\n.comp-section{padding:64px;border-bottom:1px solid var(--color-ink-200);}\n.comp-section:nth-child(even){background:var(--color-white);}\n.comp-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:36px;}\n.comp-num{\n  font-size:11px;font-weight:700;color:var(--color-forest-600);\n  background:var(--color-forest-50);border:1px solid var(--color-forest-100);\n  width:34px;height:34px;border-radius:9px;display:flex;align-items:center;\n  justify-content:center;flex-shrink:0;margin-top:3px;\n}\n.comp-title h2{font-size:30px;font-weight:700;letter-spacing:-0.016em;color:var(--color-forest-700);margin-bottom:8px;}\n.comp-title p{font-size:14px;color:var(--color-ink-500);line-height:1.65;max-width:660px;}\n.comp-body{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;}\n.comp-body.wide{grid-template-columns:1fr;}\n.comp-body.thirds{grid-template-columns:1fr 1fr 1fr;gap:32px;}\n\n/* ── PREVIEW FRAME ── */\n.preview{\n  background:var(--color-white);border:1px solid var(--color-ink-200);\n  border-radius:14px;padding:24px 24px 20px;box-shadow:var(--shadow-sm);\n}\n.preview + .preview{margin-top:14px;}\n.preview-label{font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-ink-400);padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--color-ink-100);}\n.preview-dark{background:var(--color-forest-700);border-color:var(--color-forest-600);}\n.preview-dark .preview-label{color:var(--color-forest-500);border-color:var(--color-forest-600);}\n.preview-cream{background:var(--color-cream-100);}\n\n/* ── SPEC BLOCKS ── */\n.spec-block{display:flex;flex-direction:column;gap:22px;}\n.spec-group-title{font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-forest-600);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--color-forest-50);}\n.spec-row{display:grid;grid-template-columns:148px 1fr;gap:10px;padding:5px 0;border-bottom:1px solid var(--color-ink-100);font-size:12.5px;align-items:start;}\n.spec-row:last-child{border-bottom:none;}\n.sk{color:var(--color-ink-500);font-weight:500;padding-top:1px;}\n.sv{color:var(--color-ink-900);font-weight:500;line-height:1.5;}\n.sv code{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:10.5px;background:var(--color-ink-100);padding:1px 5px;border-radius:4px;color:var(--color-forest-700);}\n.swatch{display:inline-flex;align-items:center;gap:5px;vertical-align:middle;}\n.swatch-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,0.09);}\n\n/* ── ANATOMY ── */\n.anatomy{display:flex;flex-direction:column;gap:5px;}\n.anat-item{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;padding:8px 10px;background:var(--color-cream-50);border-radius:7px;border-left:3px solid var(--color-forest-100);}\n.anat-part{font-weight:700;color:var(--color-forest-700);min-width:96px;flex-shrink:0;line-height:1.45;}\n.anat-desc{color:var(--color-ink-700);line-height:1.55;}\n\n/* ── DO/DON'T ── */\n.rules{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}\n.rule{padding:11px 13px;border-radius:9px;font-size:12px;line-height:1.55;}\n.rule-label{font-size:9px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}\n.do{background:#EDF5F0;border-left:3px solid #2E7C72;color:#1B4D3E;}\n.do .rule-label{color:#2E7C72;}\n.dont{background:#FEF3F2;border-left:3px solid #B42318;color:#7A271A;}\n.dont .rule-label{color:#B42318;}\n\n/* ── LIVE COMPONENT STYLES (Button) ── */\n.btn{font-family:var(--font-sans);font-weight:600;font-size:15px;padding:12px 22px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:none;transition:all 220ms var(--ease-out);}\n.btn:active{transform:scale(0.98);}\n.btn-primary{background:var(--color-forest-700);color:var(--color-cream-50);}\n.btn-primary:hover{background:var(--color-forest-800);}\n.btn-secondary{background:var(--color-cream-100);color:var(--color-forest-700);border:1.5px solid var(--color-forest-100);}\n.btn-secondary:hover{background:var(--color-cream-200);}\n.btn-accent{background:var(--color-mustard-500);color:var(--color-forest-900);}\n.btn-accent:hover{background:var(--color-mustard-600);}\n.btn-ghost{background:transparent;color:var(--color-forest-700);}\n.btn-ghost:hover{background:var(--color-forest-50);}\n.btn-lg{padding:16px 28px;font-size:17px;border-radius:14px;}\n.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;}\n.btn-block{width:100%;}\n\n/* ── Badge ── */\n.badge{font-weight:700;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;}\n.b-sale{background:var(--color-mustard-500);color:var(--color-forest-900);}\n.b-new{background:var(--color-forest-700);color:var(--color-cream-50);}\n.b-limited{background:var(--color-danger);color:var(--color-cream-50);}\n.b-organic{background:var(--color-forest-50);color:var(--color-forest-700);border:1px solid var(--color-forest-100);}\n\n/* ── Input ── */\n.inp{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--color-ink-200);background:var(--color-white);font-family:var(--font-sans);font-size:14px;color:var(--color-ink-900);outline:none;transition:border-color 220ms,box-shadow 220ms;}\n.inp:focus{border-color:var(--color-forest-700);box-shadow:0 0 0 4px var(--color-forest-50);}\n.inp-wrap{position:relative;}\n.inp-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--color-ink-500);}\n.inp-wrap .inp{padding-left:40px;}\n\n/* ── Checkbox ── */\n.cb{appearance:none;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--color-ink-300);background:white;cursor:pointer;display:grid;place-items:center;flex-shrink:0;}\n.cb:checked{background:var(--color-forest-700);border-color:var(--color-forest-700);}\n.cb:checked::after{content:\"\";width:5px;height:9px;border:solid var(--color-cream-50);border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px);}\n.cb-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13.5px;color:var(--color-ink-700);cursor:pointer;}\n.cb-count{color:var(--color-ink-400);font-size:12px;margin-left:auto;}\n\n/* ── Chip ── */\n.chip{font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid var(--color-ink-200);background:var(--color-white);color:var(--color-ink-700);cursor:pointer;display:inline-flex;gap:6px;align-items:center;transition:all 120ms;}\n.chip:hover{border-color:var(--color-forest-700);color:var(--color-forest-700);}\n.chip-active{background:var(--color-forest-700);color:var(--color-cream-50);border-color:var(--color-forest-700);}\n\n/* ── Qty Stepper ── */\n.qty{display:inline-flex;align-items:center;border:1.5px solid var(--color-ink-200);border-radius:12px;background:var(--color-white);overflow:hidden;}\n.qty button{width:44px;height:48px;color:var(--color-forest-700);font-size:20px;cursor:pointer;border:none;background:none;font-family:var(--font-sans);}\n.qty button:hover{background:var(--color-cream-100);}\n.qty .qv{width:44px;text-align:center;font-weight:700;color:var(--color-ink-900);font-size:15px;}\n.qty-sm button{width:32px;height:32px;font-size:16px;}\n.qty-sm .qv{width:28px;font-size:13px;}\n.qty-sm{border-radius:10px;}\n\n/* ── Toast ── */\n.toast-demo{background:var(--color-forest-700);color:var(--color-cream-50);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;display:inline-flex;gap:10px;align-items:center;box-shadow:var(--shadow-lg);}\n.t-dot{width:8px;height:8px;border-radius:999px;background:var(--color-mustard-500);flex-shrink:0;}\n\n/* ── Product Card ── */\n.prod-card{background:var(--color-white);border:1px solid var(--color-ink-200);border-radius:16px;padding:13px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow-sm);transition:all 220ms var(--ease-out);cursor:pointer;max-width:180px;}\n.prod-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}\n.prod-card:hover .pimg-inner{transform:scale(1.03);}\n.pimg{aspect-ratio:1/1;border-radius:12px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--color-cream-200),var(--color-cream-300));}\n.pimg-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform 300ms var(--ease-out);}\n.pimg-label{font-weight:800;font-size:26px;color:var(--color-forest-700);opacity:.45;letter-spacing:-0.02em;}\n.pfav{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:999px;background:white;display:flex;align-items:center;justify-content:center;color:var(--color-ink-500);box-shadow:var(--shadow-xs);}\n.pfav-active{color:var(--color-danger);}\n.pbadge{position:absolute;top:8px;left:8px;}\n.ptitle{font-size:13.5px;font-weight:600;color:var(--color-ink-900);line-height:1.3;}\n.pmeta{font-size:11.5px;color:var(--color-ink-500);}\n.pfoot{display:flex;align-items:center;justify-content:space-between;}\n.pprice{font-size:17px;font-weight:700;color:var(--color-forest-700);letter-spacing:-0.01em;}\n.pprice-old{font-size:12px;color:var(--color-ink-400);text-decoration:line-through;margin-left:4px;font-weight:500;}\n.padd{background:var(--color-forest-700);color:var(--color-cream-50);width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:background 120ms;}\n.padd:hover{background:var(--color-forest-800);}\n\n/* ── Category Tile ── */\n.cat-tile{background:var(--color-white);border:1px solid var(--color-ink-200);border-radius:16px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;box-shadow:var(--shadow-xs);cursor:pointer;transition:all 220ms var(--ease-out);width:90px;}\n.cat-tile:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}\n.cat-ic{width:50px;height:50px;border-radius:999px;background:var(--color-cream-100);display:flex;align-items:center;justify-content:center;color:var(--color-forest-700);}\n.cat-nm{font-weight:600;font-size:12px;color:var(--color-ink-900);}\n\n/* ── Value Prop Card ── */\n.val-card{background:var(--color-cream-50);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:9px;}\n.val-ic{width:38px;height:38px;border-radius:11px;background:var(--color-forest-50);color:var(--color-forest-700);display:flex;align-items:center;justify-content:center;}\n.val-h{font-size:14px;font-weight:700;color:var(--color-ink-900);}\n.val-p{font-size:12.5px;color:var(--color-ink-500);line-height:1.5;}\n\n/* ── Promo Strip ── */\n.promo{background:var(--color-forest-700);border-radius:20px;padding:28px 32px;display:flex;gap:18px;align-items:center;color:var(--color-cream-50);}\n.promo-stripe{width:4px;height:64px;background:var(--color-mustard-500);border-radius:999px;flex-shrink:0;}\n\n/* ── Hero ── */\n.hero-demo{background:var(--color-forest-700);border-radius:18px;padding:36px;color:var(--color-cream-50);}\n.hero-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-mustard-300);margin-bottom:12px;}\n.hero-h1{font-size:40px;font-weight:800;letter-spacing:-0.025em;line-height:1.04;margin-bottom:12px;}\n.hero-sub{font-size:15px;color:var(--color-forest-100);line-height:1.55;margin-bottom:22px;max-width:400px;}\n\n/* ── Crumbs ── */\n.crumbs{font-size:13px;color:var(--color-ink-500);display:flex;gap:8px;align-items:center;}\n.crumbs a:hover{color:var(--color-forest-700);}\n.crumbs .sep{color:var(--color-ink-300);}\n.crumbs .cur{color:var(--color-ink-900);font-weight:500;}\n\n/* ── Icon row ── */\n.icon-grid{display:flex;flex-wrap:wrap;gap:16px;}\n.icon-item{display:flex;flex-direction:column;align-items:center;gap:5px;}\n.icon-item span{font-size:9.5px;color:var(--color-ink-400);}\n.icon-btn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--color-ink-700);background:none;border:none;cursor:pointer;transition:background 220ms;position:relative;}\n.icon-btn:hover{background:var(--color-cream-200);color:var(--color-forest-700);}\n.bub{position:absolute;top:4px;right:4px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--color-mustard-500);color:var(--color-forest-900);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}\n\n/* ── Footer demo ── */\n.footer-demo{background:var(--color-forest-700);color:var(--color-forest-100);border-radius:14px;padding:28px;}\n.footer-cols{display:grid;grid-template-columns:2fr 1fr 1fr;gap:28px;margin-bottom:20px;}\n.fcol-h{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--color-cream-50);margin-bottom:12px;}\n.fcol-links{display:flex;flex-direction:column;gap:8px;font-size:13px;}\n.fcol-links a{color:var(--color-forest-100);}\n.fcol-links a:hover{color:var(--color-cream-50);}\n.footer-bottom-demo{border-top:1px solid var(--color-forest-600);padding-top:14px;display:flex;justify-content:space-between;font-size:12px;}\n\n/* ── Accordion ── */\ndetails.accord{border-bottom:1px solid var(--color-ink-200);}\ndetails.accord summary{padding:13px 0;font-size:14px;font-weight:600;color:var(--color-ink-900);cursor:pointer;display:flex;justify-content:space-between;align-items:center;list-style:none;}\ndetails.accord summary::-webkit-details-marker{display:none;}\ndetails.accord summary::after{content:\"+\";color:var(--color-forest-700);font-weight:400;font-size:20px;line-height:1;}\ndetails.accord[open] summary::after{content:\"−\";}\ndetails.accord p{padding:0 0 14px;font-size:13px;color:var(--color-ink-700);line-height:1.6;}\n\n/* ── Cart Line ── */\n.cart-line{display:grid;grid-template-columns:56px 1fr auto;gap:12px;padding:12px 14px;background:var(--color-white);border:1px solid var(--color-ink-200);border-radius:13px;}\n.cimg{border-radius:9px;background:linear-gradient(135deg,var(--color-cream-200),var(--color-cream-300));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--color-forest-700);opacity:.7;}\n\n/* ── Header nav demo ── */\n.header-demo{display:flex;align-items:center;gap:20px;padding:13px 20px;background:rgba(251,251,246,0.92);border-radius:12px;border:1px solid var(--color-ink-200);}\n.nav-link{font-size:13px;color:var(--color-ink-700);font-weight:500;padding:3px 2px;}\n.nav-link:hover{color:var(--color-forest-700);}\n.nav-link.active{color:var(--color-forest-700);font-weight:600;}\n\n/* ── Section header demo ── */\n.section-head-demo{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;}\n.sec-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-forest-600);margin-bottom:6px;}\n.sec-h2{font-size:28px;font-weight:700;letter-spacing:-0.018em;color:var(--color-forest-700);}\n.see-all{color:var(--color-forest-700);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:4px;}\n.see-all:hover{text-decoration:underline;text-decoration-thickness:1.5px;text-underline-offset:3px;}\n\n/* ── PDP meta card ── */\n.pdp-meta-card{background:var(--color-cream-50);border-radius:12px;padding:13px;display:flex;gap:11px;align-items:flex-start;}\n.pmc-ic{color:var(--color-forest-700);flex-shrink:0;}\n.pmc-title{font-size:12.5px;font-weight:700;color:var(--color-ink-900);}\n.pmc-sub{font-size:11.5px;color:var(--color-ink-500);}\n\n/* ── utilities ── */\n.flex{display:flex;} .flex-col{flex-direction:column;} .items-center{align-items:center;} .wrap{flex-wrap:wrap;}\n.gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;}\n.mt-2{margin-top:8px;} .mt-3{margin-top:14px;} .mt-4{margin-top:20px;}\n.mr-2{margin-right:8px;}\n.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}\n.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}\n.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}\n\n@media(max-width:960px){\n  .layout{grid-template-columns:1fr;}\n  .sidebar{position:static;height:auto;}\n  .comp-section{padding:40px 24px;}\n  .doc-header{padding:40px 24px;}\n  .comp-body,.comp-body.thirds{grid-template-columns:1fr;}\n  .token-grid{grid-template-columns:1fr 1fr;}\n  .token-section{padding:40px 24px;}\n}\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n<div class=\"layout\">\n\n<!-- ═══════════ SIDEBAR ═══════════ -->\n<nav class=\"sidebar\" aria-label=\"Component navigation\">\n  <div class=\"sb-top\">\n    <div class=\"sb-brand\">Ayira Minimart<\u002Fdiv>\n    <div class=\"sb-subtitle\">Component Spec · v1.0<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sb-group\">\n    <div class=\"sb-group-title\">Tokens<\u002Fdiv>\n    <ul class=\"sb-nav\">\n      <li><a href=\"#tokens\"><span class=\"sb-num\">—<\u002Fspan>Quick Reference<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <div class=\"sb-group\">\n    <div class=\"sb-group-title\">Core UI<\u002Fdiv>\n    <ul class=\"sb-nav\">\n      <li><a href=\"#button\"><span class=\"sb-num\">01<\u002Fspan>Button<\u002Fa><\u002Fli>\n      <li><a href=\"#badge\"><span class=\"sb-num\">02<\u002Fspan>Badge<\u002Fa><\u002Fli>\n      <li><a href=\"#icon\"><span class=\"sb-num\">03<\u002Fspan>Icon<\u002Fa><\u002Fli>\n      <li><a href=\"#logo\"><span class=\"sb-num\">04<\u002Fspan>Logo<\u002Fa><\u002Fli>\n      <li><a href=\"#input\"><span class=\"sb-num\">05<\u002Fspan>Input &amp; Search<\u002Fa><\u002Fli>\n      <li><a href=\"#checkbox\"><span class=\"sb-num\">06<\u002Fspan>Checkbox<\u002Fa><\u002Fli>\n      <li><a href=\"#chip\"><span class=\"sb-num\">07<\u002Fspan>Chip / Filter Tag<\u002Fa><\u002Fli>\n      <li><a href=\"#qty\"><span class=\"sb-num\">08<\u002Fspan>Quantity Stepper<\u002Fa><\u002Fli>\n      <li><a href=\"#toast\"><span class=\"sb-num\">09<\u002Fspan>Toast<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <div class=\"sb-group\">\n    <div class=\"sb-group-title\">Commerce<\u002Fdiv>\n    <ul class=\"sb-nav\">\n      <li><a href=\"#product-card\"><span class=\"sb-num\">10<\u002Fspan>Product Card<\u002Fa><\u002Fli>\n      <li><a href=\"#category-tile\"><span class=\"sb-num\">11<\u002Fspan>Category Tile<\u002Fa><\u002Fli>\n      <li><a href=\"#cart-drawer\"><span class=\"sb-num\">12<\u002Fspan>Cart Drawer<\u002Fa><\u002Fli>\n      <li><a href=\"#pdp\"><span class=\"sb-num\">13<\u002Fspan>Product Detail Page<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <div class=\"sb-group\">\n    <div class=\"sb-group-title\">Layout &amp; Nav<\u002Fdiv>\n    <ul class=\"sb-nav\">\n      <li><a href=\"#header\"><span class=\"sb-num\">14<\u002Fspan>Header<\u002Fa><\u002Fli>\n      <li><a href=\"#hero\"><span class=\"sb-num\">15<\u002Fspan>Hero Section<\u002Fa><\u002Fli>\n      <li><a href=\"#section-head\"><span class=\"sb-num\">16<\u002Fspan>Section Header<\u002Fa><\u002Fli>\n      <li><a href=\"#promo-strip\"><span class=\"sb-num\">17<\u002Fspan>Promo Strip<\u002Fa><\u002Fli>\n      <li><a href=\"#value-prop\"><span class=\"sb-num\">18<\u002Fspan>Value Prop Card<\u002Fa><\u002Fli>\n      <li><a href=\"#filter-sidebar\"><span class=\"sb-num\">19<\u002Fspan>Filter Sidebar<\u002Fa><\u002Fli>\n      <li><a href=\"#breadcrumbs\"><span class=\"sb-num\">20<\u002Fspan>Breadcrumbs<\u002Fa><\u002Fli>\n      <li><a href=\"#footer\"><span class=\"sb-num\">21<\u002Fspan>Footer<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ═══════════ MAIN ═══════════ -->\n<main class=\"main\">\n\n<!-- DOC HEADER -->\n<div class=\"doc-header\">\n  <div class=\"doc-eyebrow\">Ayira Minimart Design System<\u002Fdiv>\n  <h1>Component Spec<\u002Fh1>\n  <p>A complete visual and behavioral reference for every UI component in the Ayira storefront. Each component is described in plain language with exact token values, anatomy, states, and usage rules — readable by designers, developers, and AI agents alike, without requiring source code.<\u002Fp>\n  <div class=\"doc-meta\">\n    <div class=\"doc-meta-item\"><div class=\"dm-label\">Version<\u002Fdiv><div class=\"dm-val\">1.0<\u002Fdiv><\u002Fdiv>\n    <div class=\"doc-meta-item\"><div class=\"dm-label\">Date<\u002Fdiv><div class=\"dm-val\">June 2026<\u002Fdiv><\u002Fdiv>\n    <div class=\"doc-meta-item\"><div class=\"dm-label\">Typeface<\u002Fdiv><div class=\"dm-val\">Hanken Grotesk<\u002Fdiv><\u002Fdiv>\n    <div class=\"doc-meta-item\"><div class=\"dm-label\">Icons<\u002Fdiv><div class=\"dm-val\">Lucide (inline SVG)<\u002Fdiv><\u002Fdiv>\n    <div class=\"doc-meta-item\"><div class=\"dm-label\">Components<\u002Fdiv><div class=\"dm-val\">21<\u002Fdiv><\u002Fdiv>\n    <div class=\"doc-meta-item\"><div class=\"dm-label\">Surface<\u002Fdiv><div class=\"dm-val\">Web Storefront<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TOKEN QUICK-REF -->\n<section id=\"tokens\" class=\"token-section\">\n  <h2>Token Quick Reference<\u002Fh2>\n  <p>Every visual decision in Ayira resolves to one of these tokens. Color tokens are in three families — Forest (brand), Mustard (accent), and Cream/Ink (neutrals). All shadow tokens are tinted with Forest green rather than neutral gray.<\u002Fp>\n  <div class=\"token-grid\">\n    <div>\n      <div class=\"token-group-title\">Forest (Brand)<\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#062E29;\"><\u002Fspan><span class=\"token-name\">--color-forest-900<\u002Fspan><span class=\"token-hex\">#062E29<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#093E37;\"><\u002Fspan><span class=\"token-name\">--color-forest-800<\u002Fspan><span class=\"token-hex\">#093E37<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#0D4F47;\"><\u002Fspan><span class=\"token-name\">--color-forest-700 ★<\u002Fspan><span class=\"token-hex\">#0D4F47<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#1B6259;\"><\u002Fspan><span class=\"token-name\">--color-forest-600<\u002Fspan><span class=\"token-hex\">#1B6259<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#2E7C72;\"><\u002Fspan><span class=\"token-name\">--color-forest-500<\u002Fspan><span class=\"token-hex\">#2E7C72<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#D7E4E1;\"><\u002Fspan><span class=\"token-name\">--color-forest-100<\u002Fspan><span class=\"token-hex\">#D7E4E1<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#EBF1EF;\"><\u002Fspan><span class=\"token-name\">--color-forest-50<\u002Fspan><span class=\"token-hex\">#EBF1EF<\u002Fspan><\u002Fdiv>\n      <div class=\"token-group-title\" style=\"margin-top:20px;\">Mustard (Accent)<\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#D4A737;\"><\u002Fspan><span class=\"token-name\">--color-mustard-500 ★<\u002Fspan><span class=\"token-hex\">#D4A737<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#E8C97C;\"><\u002Fspan><span class=\"token-name\">--color-mustard-300<\u002Fspan><span class=\"token-hex\">#E8C97C<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#F7EBC4;\"><\u002Fspan><span class=\"token-name\">--color-mustard-100<\u002Fspan><span class=\"token-hex\">#F7EBC4<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"token-group-title\">Cream (Surfaces)<\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#FBFBF6;border:1px solid #eee;\"><\u002Fspan><span class=\"token-name\">--color-cream-50 (raised)<\u002Fspan><span class=\"token-hex\">#FBFBF6<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#F6F6EE;border:1px solid #eee;\"><\u002Fspan><span class=\"token-name\">--color-cream-100 ★ (app bg)<\u002Fspan><span class=\"token-hex\">#F6F6EE<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#ECECDF;border:1px solid #eee;\"><\u002Fspan><span class=\"token-name\">--color-cream-200<\u002Fspan><span class=\"token-hex\">#ECECDF<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#DCDCC8;border:1px solid #eee;\"><\u002Fspan><span class=\"token-name\">--color-cream-300<\u002Fspan><span class=\"token-hex\">#DCDCC8<\u002Fspan><\u002Fdiv>\n      <div class=\"token-group-title\" style=\"margin-top:20px;\">Ink (Text &amp; Borders)<\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#101828;\"><\u002Fspan><span class=\"token-name\">--color-ink-900 (headlines)<\u002Fspan><span class=\"token-hex\">#101828<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#344054;\"><\u002Fspan><span class=\"token-name\">--color-ink-700 ★ (body)<\u002Fspan><span class=\"token-hex\">#344054<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#667085;\"><\u002Fspan><span class=\"token-name\">--color-ink-500 (secondary)<\u002Fspan><span class=\"token-hex\">#667085<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#98A2B3;\"><\u002Fspan><span class=\"token-name\">--color-ink-400 (subtle)<\u002Fspan><span class=\"token-hex\">#98A2B3<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#D0D5DD;border:1px solid #eee;\"><\u002Fspan><span class=\"token-name\">--color-ink-300 (border)<\u002Fspan><span class=\"token-hex\">#D0D5DD<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#E4E7EC;border:1px solid #eee;\"><\u002Fspan><span class=\"token-name\">--color-ink-200 (border subtle)<\u002Fspan><span class=\"token-hex\">#E4E7EC<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-swatch\" style=\"background:#B42318;\"><\u002Fspan><span class=\"token-name\">--color-danger<\u002Fspan><span class=\"token-hex\">#B42318<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"token-group-title\">Typography Scale<\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:13px;font-weight:800;letter-spacing:-0.025em;color:#0D4F47;min-width:60px;\">Aa<\u002Fspan><span class=\"token-name\">Display · 64px · 800 · −0.025em<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:12px;font-weight:700;letter-spacing:-0.022em;color:#0D4F47;min-width:60px;\">Aa<\u002Fspan><span class=\"token-name\">H1 · 48px · 700 · −0.022em<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:11px;font-weight:700;color:#0D4F47;min-width:60px;\">Aa<\u002Fspan><span class=\"token-name\">H2 · 36px · 700 · −0.018em<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:10px;font-weight:600;color:#0D4F47;min-width:60px;\">Aa<\u002Fspan><span class=\"token-name\">H3 · 28px · 600 · −0.014em<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:10px;font-weight:400;color:#344054;min-width:60px;\">Aa<\u002Fspan><span class=\"token-name\">Body · 16px · 400 · lh 1.55<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:9px;font-weight:400;color:#344054;min-width:60px;\">Aa<\u002Fspan><span class=\"token-name\">Body Sm · 14px · 400 · lh 1.5<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:9px;font-weight:500;color:#667085;min-width:60px;\">Aa<\u002Fspan><span class=\"token-name\">Caption · 13px · 500<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span style=\"font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#1B6259;min-width:60px;\">EYE<\u002Fspan><span class=\"token-name\">Eyebrow · 11px · 700 · +0.08em · CAPS<\u002Fspan><\u002Fdiv>\n      <div class=\"token-group-title\" style=\"margin-top:20px;\">Motion &amp; Shape<\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-name\">--dur-fast<\u002Fspan><span class=\"token-hex\">120ms<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-name\">--dur-med<\u002Fspan><span class=\"token-hex\">220ms<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-name\">--dur-slow<\u002Fspan><span class=\"token-hex\">360ms<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-name\">--ease-out<\u002Fspan><span class=\"token-hex\">cubic-bezier(0.22,1,0.36,1)<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-name\">--radius-sm / md / lg<\u002Fspan><span class=\"token-hex\">8 / 12 / 16px<\u002Fspan><\u002Fdiv>\n      <div class=\"token-row\"><span class=\"token-name\">--radius-pill<\u002Fspan><span class=\"token-hex\">999px<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     01  BUTTON\n════════════════════════════════ -->\n<section id=\"button\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">01<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Button<\u002Fh2>\n      <p>The primary interactive control for user actions. Four visual variants cover every commerce context. Uses <code>Hanken Grotesk<\u002Fcode> weight 600, Title Case for commerce actions, sentence case for navigational labels. Scale-press on active state.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"comp-body\">\n    <div>\n      <div class=\"preview\">\n        <div class=\"preview-label\">All variants — default size<\u002Fdiv>\n        <div class=\"flex wrap gap-3 items-center\">\n          <button class=\"btn btn-primary\">Add to Cart<\u002Fbutton>\n          <button class=\"btn btn-secondary\">Browse pantry<\u002Fbutton>\n          <button class=\"btn btn-accent\">Shop produce →<\u002Fbutton>\n          <button class=\"btn btn-ghost\">Learn more<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview preview-dark mt-3\">\n        <div class=\"preview-label\">Large size · on forest background<\u002Fdiv>\n        <div class=\"flex wrap gap-3 items-center\">\n          <button class=\"btn btn-lg btn-accent\">Shop produce →<\u002Fbutton>\n          <button class=\"btn btn-lg btn-ghost\" style=\"color:var(--color-cream-50);\">Browse pantry<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview mt-3\">\n        <div class=\"preview-label\">Block (full-width) · used in cart footer<\u002Fdiv>\n        <button class=\"btn btn-primary btn-block btn-lg\">Continue to checkout →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-block\">\n      <div>\n        <div class=\"spec-group-title\">Variants<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Primary<\u002Fspan><span class=\"sv\"><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:#0D4F47;\"><\u002Fspan><\u002Fspan> Forest-700 bg · Cream-50 text · no border. The one main action per view.<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Secondary<\u002Fspan><span class=\"sv\"><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:#F6F6EE;\"><\u002Fspan><\u002Fspan> Cream-100 bg · Forest-700 text · 1.5px Forest-100 border. Paired with Primary.<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Accent<\u002Fspan><span class=\"sv\"><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:#D4A737;\"><\u002Fspan><\u002Fspan> Mustard-500 bg · Forest-900 text · no border. Hero &amp; promo CTAs only.<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Ghost<\u002Fspan><span class=\"sv\">Transparent bg · Forest-700 text. Low-emphasis or paired with Accent on dark bg.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"spec-group-title\">Sizing<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Default<\u002Fspan><span class=\"sv\">15px · weight 600 · padding 12px 22px · radius 12px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Large<\u002Fspan><span class=\"sv\">17px · weight 600 · padding 16px 28px · radius 14px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Block<\u002Fspan><span class=\"sv\"><code>width: 100%<\u002Fcode> — cart footer, checkout flows<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Icon gap<\u002Fspan><span class=\"sv\">8px between icon and label<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"spec-group-title\">States<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Hover · Primary<\u002Fspan><span class=\"sv\">Forest-800 bg<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Hover · Secondary<\u002Fspan><span class=\"sv\">Cream-200 bg<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Hover · Accent<\u002Fspan><span class=\"sv\">Mustard-600 bg<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Hover · Ghost<\u002Fspan><span class=\"sv\">Forest-50 bg fill<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Active/Press<\u002Fspan><span class=\"sv\"><code>scale(0.98)<\u002Fcode> + one step deeper bg · 120ms<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Focus rin 2Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Radius<\u002Fspan><span class=\"sv\">12px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Resting<\u002Fspan><span class=\"sv\">No bg · Ink-700<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Hover<\u002Fspan><span class=\"sv\">Cream-200 bg · Forest-700 color<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Notification bubble<\u002Fspan><span class=\"sv\">18px pill · Mustard-500 bg · Forest-900 text · 11px weight 700 · absolute top-right at 4px offset<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rules\">\n        <div class=\"rule do\"><div class=\"rule-label\">Do<\u002Fdiv>Always include aria-label on icon-only buttons. Pair icons with text labels in navigation.<\u002Fdiv>\n        <div class=\"rule dont\"><div class=\"rule-label\">Don't<\u002Fdiv>Mix stroke weights. Never use emoji or illustrations as icons in UI. Don't hardcode colors.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     04  LOGO\n════════════════════════════════ -->\n<section id=\"logo\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">04<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Logo<\u002Fh2>\n      <p>A two-part identity: a <strong>wordmark<\u002Fstrong> (\"ayira Minimart\" in a custom high-contrast modern serif lockup) and a circular <strong>brandmark<\u002Fstrong> (sun emblem). Both are image files — never re-typeset. The serif is exclusive to the logo; all UI uses Hanken Grotesk.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"comp-body\">\n    <div>\n      <div class=\"preview\">\n        <div class=\"preview-label\">Wordmark — forest on cream (header)<\u002Fdiv>\n        <div style=\"padding:12px 0;font-style:italic;font-size:12px;color:var(--color-ink-400);\">logo-wordmark-forest.png · height 36px · width auto<\u002Fdiv>\n        <div style=\"background:var(--color-cream-100);border-radius:8px;padding:16px;display:flex;align-items:center;gap:10px;\">\n          <div style=\"font-size:20px;font-weight:800;color:var(--color-forest-700);letter-spacing:-0.02em;\">ayira<\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:500;color:var(--color-forest-600);\">Minimart<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview preview-dark mt-3\">\n        <div class=\"preview-label\">Wordmark — cream on forest (footer)<\u002Fdiv>\n        <div style=\"font-style:italic;font-size:11px;color:var(--color-forest-500);margin-bottom:10px;\">logo-wordmark-cream.png · height 56px · width auto<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div style=\"font-size:24px;font-weight:800;color:var(--color-cream-50);letter-spacing:-0.02em;\">ayira<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:500;color:var(--color-forest-100);\">Minimart<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-block\">\n      <div>\n        <div class=\"spec-group-title\">Asset Files<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">logo-wordmark-forest.png<\u002Fspan><span class=\"sv\">Full lockup · Forest fill · transparent bg → use on cream/white<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">logo-wordmark-cream.png<\u002Fspan><span class=\"sv\">Full lockup · Cream fill · transparent bg → use on forest/dark<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">logo-mark-forest.png<\u002Fspan><span class=\"sv\">Sun emblem only · Forest fill · transparent bg<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">logo-mark-cream.png<\u002Fspan><span class=\"sv\">Sun emblem · Cream fill → use on forest backgrounds<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">logo-mark-on-white.png<\u002Fspan><span class=\"sv\">Emblem with locked white background (favicon, avatars)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"spec-group-title\">Usage &amp; Sizing<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Header<\u002Fspan><span class=\"sv\">Wordmark · height 36px · width auto<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Footer<\u002Fspan><span class=\"sv\">Wordmark (cream) · height 56px · width auto<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Tight spaces<\u002Fspan><span class=\"sv\">Brandmark (mark) — favicons, avatars, badges<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Minimum size<\u002Fspan><span class=\"sv\">24px height — smaller loses legibility of \"Minimart\" subtext<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Mark vs wordmark<\u002Fspan><span class=\"sv\">Wordmark wherever space allows. Mark when compact or for an iconic moment.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rules\">\n        <div class=\"rule do\"><div class=\"rule-label\">Do<\u002Fdiv>Use as an image tag. Let it scale with <code>height<\u002Fcode> only, <code>width: auto<\u002Fcode>.<\u002Fdiv>\n        <div class=\"rule dont\"><div class=\"rule-label\">Don't<\u002Fdiv>Re-typeset the wordmark. Apply CSS filters, shadows, or crop the lockup. Use the mark alone when space permits the full wordmark.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     05  INPUT & SEARCH\n════════════════════════════════ -->\n<section id=\"input\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">05<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Input &amp; Search<\u002Fh2>\n      <p>Text inputs used in the header search bar and the footer newsletter form. The search input carries a leading search icon. All inputs share the same focus treatment — Forest-700 border with a 4px Forest-50 ring. No rounded pill shape; radius is 12px.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"comp-body\">\n    <div>\n      <div class=\"preview\">\n        <div class=\"preview-label\">Search — default state<\u002Fdiv>\n        <div class=\"inp-wrap\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3-3\"><\u002Fpath><\u002Fsvg>\n          <input class=\"inp\" placeholder=\"Search produce, pantry, more\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview mt-3\">\n        <div class=\"preview-label\">Search — focused state<\u002Fdiv>\n        <div class=\"inp-wrap\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"color:var(--color-forest-700);\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3-3\"><\u002Fpath><\u002Fsvg>\n          <input class=\"inp\" value=\"heirloom tomatoes\" style=\"border-color:var(--color-forest-700);box-shadow:0 0 0 4px var(--color-forest-50);\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview preview-dark mt-3\">\n        <div class=\"preview-label\">Newsletter input (footer context)<\u002Fdiv>\n        <input style=\"width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--color-forest-600);background:var(--color-forest-800);color:var(--color-cream-50);font-family:var(--font-sans);font-size:14px;outline:none;\" placeholder=\"you@neighborhood.com\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-block\">\n      <div>\n        <div class=\"spec-group-title\">Header Search<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Background<\u002Fspan><span class=\"sv\">White<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Border (resting)<\u002Fspan><span class=\"sv\">1.5px · Ink-200 (<code>#E4E7EC<\u002Fcode>)<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Border (focus)<\u002Fspan><span class=\"sv\">Forest-700 (<code>#0D4F47<\u002Fcode>)<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Focus ring<\u002Fspan><span class=\"sv\">4px box-shadow · Forest-50 (<code>#EBF1EF<\u002Fcode>)<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Radius<\u002Fspan><span class=\"sv\">12px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Padding<\u002Fspan><span class=\"sv\">11px 14px 11px 42px (with leading icon)<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Font<\u002Fspan><span class=\"sv\">14px · regular · Ink-900 · placeholder Ink-500<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Max width<\u002Fspan><span class=\"sv\">360px · <code>flex:1<\u002Fcode> in header bar<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Leading icon<\u002Fspan><span class=\"sv\">Search · 16px · absolute left:13px · Ink-500 → Forest-700 on focus<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Transition<\u002Fspan><span class=\"sv\">border-color + box-shadow · 220ms ease-out<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"spec-group-title\">Footer Newsletter Input<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Background<\u002Fspan><span class=\"sv\">Forest-800 (<code>#093E37<\u002Fcode>)<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Border<\u002Fspan><span class=\"sv\">1.5px · Forest-600 resting · Mustard-500 on focus<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Text / placeholder<\u002Fspan><span class=\"sv\">Cream-50 text · Forest-100 placeholder<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Radius<\u002Fspan><span class=\"sv\">10px<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     06  CHECKBOX\n════════════════════════════════ -->\n<section id=\"checkbox\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">06<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Checkbox<\u002Fh2>\n      <p>Custom-styled checkbox used in the filter sidebar on category pages. The default browser checkbox is fully overridden. Each row shows a filter label and an optional item count pushed to the far right.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"comp-body\">\n    <div>\n      <div class=\"preview\">\n        <div class=\"preview-label\">Unchecked · Checked states<\u002Fdiv>\n        <label class=\"cb-row\"><input type=\"checkbox\" class=\"cb\"><span>Organic<\u002Fspan><span class=\"cb-count\">5<\u002Fspan><\u002Flabel>\n        <label class=\"cb-row\"><input type=\"checkbox\" class=\"cb\" checked=\"\"><span>Local<\u002Fspan><span class=\"cb-count\">8<\u002Fspan><\u002Flabel>\n        <label class=\"cb-row\"><input type=\"checkbox\" class=\"cb\"><span>On sale<\u002Fspan><span class=\"cb-count\">2<\u002Fspan><\u002Flabel>\n        <label class=\"cb-row\"><input type=\"checkbox\" class=\"cb\" checked=\"\"><span>In season<\u002Fspan><span class=\"cb-count\">6<\u002Fspan><\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-block\">\n      <div>\n        <div class=\"spec-group-title\">Visual Spec<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Size<\u002Fspan><span class=\"sv\">18×18px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Radius<\u002Fspan><span class=\"sv\">5px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Unchecked border<\u002Fspan><span class=\"sv\">1.5px · Ink-300 · White bg<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Checked bg<\u002Fspan><span class=\"sv\">Forest-700 · Forest-700 border<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Checkmark<\u002Fspan><span class=\"sv\">White · 2px stroke · 5×9px · rotated 45° — drawn with CSS border trick<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Label<\u002Fspan><span class=\"sv\">14px · Ink-700 · weight regular<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Count<\u002Fspan><span class=\"sv\">13px · Ink-400 · pushed right with <code>margin-left:auto<\u002Fcode><\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Row padding<\u002Fspan><span class=\"sv\">5px vertical<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Label gap<\u002Fspan><span class=\"sv\">10px between checkbox and text<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Cursor<\u002Fspan><span class=\"sv\">pointer on the label<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     07  CHIP\n════════════════════════════════ -->\n<section id=\"chip\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">07<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Chip / Filter Tag<\u002Fh2>\n      <p>Pill-shaped interactive tags shown above the product grid on category pages. Represent active filters and allow adding new ones. Two states: default (inactive) and active (Forest-700 fill). Active chips include an × icon to remove the filter.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"comp-body\">\n    <div>\n      <div class=\"preview\">\n        <div class=\"preview-label\">Default · Active · Add<\u002Fdiv>\n        <div class=\"flex gap-2 wrap items-center\">\n          <span class=\"chip\">Local<\u002Fspan>\n          <span class=\"chip\">On sale<\u002Fspan>\n          <span class=\"chip chip-active\">Organic ×<\u002Fspan>\n          <span class=\"chip\">+ Add filter<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-block\">\n      <div>\n        <div class=\"spec-group-title\">Visual Spec<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Default bg<\u002Fspan><span class=\"sv\">White · Ink-200 border · Ink-700 text<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Default hover<\u002Fspan><span class=\"sv\">Forest-700 border + Forest-700 text<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Active<\u002Fspan><span class=\"sv\">Forest-700 bg + border · Cream-50 text<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Font<\u002Fspan><span class=\"sv\">13px · weight regular<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Padding<\u002Fspan><span class=\"sv\">7px 14px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Shape<\u002Fspan><span class=\"sv\">Pill — <code>border-radius: 999px<\u002Fcode><\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Remove icon<\u002Fspan><span class=\"sv\">Lucide \"x\" at 12px · 6px gap after label<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Transition<\u002Fspan><span class=\"sv\">All · 120ms (--dur-fast)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     08  QUANTITY STEPPER\n════════════════════════════════ -->\n<section id=\"qty\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">08<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Quantity Stepper<\u002Fh2>\n      <p>Inline +/− control for selecting product quantity. Used on the Product Detail Page (full size) and inside Cart Drawer line items (compact). Min value is 1 on PDP; decrementing to 0 in the cart removes the line item entirely.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"comp-body\">\n    <div>\n      <div class=\"preview\">\n        <div class=\"preview-label\">Full size (PDP)<\u002Fdiv>\n        <div class=\"qty\">\n          <button>−<\u002Fbutton>\n          <div class=\"qv\">2<\u002Fdiv>\n          <button>+<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview mt-3\">\n        <div class=\"preview-label\">Compact (Cart Drawer)<\u002Fdiv>\n        <div class=\"qty qty-sm\">\n          <button>−<\u002Fbutton>\n          <div class=\"qv\">1<\u002Fdiv>\n          <button>+<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-block\">\n      <div>\n        <div class=\"spec-group-title\">Full Size (PDP)<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Container<\u002Fspan><span class=\"sv\">White bg · 1.5px Ink-200 border · radius 12px · overflow hidden<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Buttons<\u002Fspan><span class=\"sv\">44×48px · Forest-700 color · −/+ at 16px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Button hover<\u002Fspan><span class=\"sv\">Cream-100 bg fill<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Value cell<\u002Fspan><span class=\"sv\">44px wide · centered · weight 700 · Ink-900 · 15px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Min value<\u002Fspan><span class=\"sv\">1 — cannot decrement below 1 on PDP<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"spec-group-title\">Compact (Cart)<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Buttons<\u002Fspan><span class=\"sv\">32×32px · 16px icon<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Value cell<\u002Fspan><span class=\"sv\">28px wide · 13px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Radius<\u002Fspan><span class=\"sv\">10px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">At zero<\u002Fspan><span class=\"sv\">Line item is removed from cart entirely<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     09  TOAST\n════════════════════════════════ -->\n<section id=\"toast\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">09<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Toast<\u002Fh2>\n      <p>A brief confirmation notification that slides up from the bottom-center of the screen. Confirms non-destructive actions like \"Added to cart.\" Auto-dismisses after ~2 seconds. Non-blocking — the user can continue shopping while it's visible.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"comp-body\">\n    <div>\n      <div class=\"preview\">\n        <div class=\"preview-label\">Toast notification<\u002Fdiv>\n        <div class=\"toast-demo\">\n          <span class=\"t-dot\"><\u002Fspan>\n          Heirloom Tomatoes added to cart\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"spec-block\">\n      <div>\n        <div class=\"spec-group-title\">Visual Spec<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Background<\u002Fspan><span class=\"sv\">Forest-700 (<code>#0D4F47<\u002Fcode>)<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Text<\u002Fspan><span class=\"sv\">Cream-50 · 14px · weight 500<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Dot indicator<\u002Fspan><span class=\"sv\">8px circle · Mustard-500 · 10px gap from text · flex-shrink 0<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Padding<\u002Fspan><span class=\"sv\">12px 20px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Radius<\u002Fspan><span class=\"sv\">12px<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Shadow<\u002Fspan><span class=\"sv\">--shadow-lg<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Position<\u002Fspan><span class=\"sv\">Fixed · bottom 24px · horizontally centered via <code>left:50%; translateX(-50%)<\u002Fcode><\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">z-index<\u002Fspan><span class=\"sv\">200 (above all other surfaces including cart drawer)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"spec-group-title\">Animation<\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Hidden<\u002Fspan><span class=\"sv\"><code>opacity:0<\u002Fcode> + <code>translateY(20px)<\u002Fcode><\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Visible<\u002Fspan><span class=\"sv\"><code>opacity:1<\u002Fcode> + <code>translateY(0)<\u002Fcode><\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Transition<\u002Fspan><span class=\"sv\">all · 220ms ease-out (slide up + fade in simultaneously)<\u002Fspan><\u002Fdiv>\n        <div class=\"spec-row\"><span class=\"sk\">Auto-dismiss<\u002Fspan><span class=\"sv\">~2000ms then transitions back to hidden<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     10  PRODUCT CARD\n════════════════════════════════ -->\n<section id=\"product-card\" class=\"comp-section\">\n  <div class=\"comp-header\">\n    <span class=\"comp-num\">10<\u002Fspan>\n    <div class=\"comp-title\">\n      <h2>Product Card<\u002Fh2>\n      <p>The primary browsable product unit. Clicking the card body opens the Product Detail Page. The Add button (+) adds directly to cart without navigating. A heart button sa
